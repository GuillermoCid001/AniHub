<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="recursos/css/global.css">
    </head>
<body>

  <div class="bg-overlay"></div>

  <div class="login-card">
    <div class="brand">AniHub</div>
    <div class="accent-bar"></div>
    <p class="login-title">Bienvenido de vuelta</p>

    <div class="field-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="tu@email.com" />
    </div>

    <div class="field-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••" />
    </div>

    <div class="options-row">
      <label class="remember-label">
        <input type="checkbox" />
        Recuérdame
      </label>
      <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <button class="btn-login">Iniciar sesión</button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-line"></div>
    </div>



    <p class="signup-row">¿Primera vez aquí? <a href="#">Crear cuenta</a></p>
  </div>

  <div class="bottom-bar">
    <a href="#">Ayuda</a>
    <a href="#">Privacidad</a>
    <a href="#">Condiciones</a>
  </div>

</body>
</html>
