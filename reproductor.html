<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Reproduciendo...</title>
  <link rel="stylesheet" href="recursos/css/global.css">
  <script src="recursos/js/auth.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100% !important;
      height: 100% !important;
      background: #000 !important;
      overflow: hidden !important;
      display: block !important;
      align-items: unset !important;
      justify-content: unset !important;
      padding: 0 !important;
    }

    /* Vídeo a pantalla completa real */
    .player-wrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video-player {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      /* Usar object-fit cover para llenar como Netflix */
      object-fit: contain;
    }

    /* ── Controles superpuestos (aparecen al mover el ratón) ── */
    .player-ui {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-ui.visible { opacity: 1; pointer-events: auto; }

    /* Gradiente top */
    .ui-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
      display: flex;
      align-items: flex-start;
      padding: 20px 28px 0;
      gap: 20px;
    }

    .ui-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: opacity 0.2s;
    }
    .ui-back:hover { opacity: 0.8; }
    .ui-back svg { width: 22px; height: 22px; }

    .ui-title {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.85);
      line-height: 1.3;
      padding-top: 2px;
    }
    .ui-title strong { display: block; font-size: 1rem; color: #fff; }

    /* Gradiente bottom */
    .ui-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 140px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 28px 18px;
      gap: 12px;
    }

    /* Barra de progreso */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
      transition: height 0.15s;
    }
    .progress-bar:hover { height: 6px; }
    .progress-fill {
      height: 100%;
      background: var(--red, #e50914);
      border-radius: 2px;
      width: 0%;
      position: relative;
      transition: width 0.1s linear;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .progress-bar:hover .progress-fill::after { opacity: 1; }

    .time-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.8);
      white-space: nowrap;
      min-width: 90px;
      text-align: right;
    }

    /* Botones de control */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, transform 0.15s;
      opacity: 0.9;
    }
    .ctrl-btn:hover { opacity: 1; transform: scale(1.1); }
    .ctrl-btn svg { width: 26px; height: 26px; }
    .ctrl-btn.sm svg { width: 20px; height: 20px; }

    /* Botón play/pausa grande */
    .ctrl-btn.play svg { width: 32px; height: 32px; }

    /* Título episodio centrado */
    .controls-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.78rem;
      color: rgba(255,255,255,0.6);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Botón "Omitir intro" estilo Netflix */
    .skip-intro {
      position: fixed;
      bottom: 160px;
      right: 28px;
      background: rgba(20,20,20,0.85);
      border: 1.5px solid rgba(255,255,255,0.6);
      color: #fff;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 600;
      border-radius: 3px;
      cursor: pointer;
      z-index: 20;
      backdrop-filter: blur(4px);
      display: none;
      transition: background 0.2s;
    }
    .skip-intro:hover { background: rgba(50,50,50,0.9); }
    .skip-intro.show { display: block; }

    /* Volumen slider mini */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .volume-slider {
      width: 70px;
      height: 3px;
      accent-color: #fff;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, width 0.2s;
      width: 0;
    }
    .volume-wrap:hover .volume-slider {
      opacity: 1;
      width: 70px;
    }
  </style>
</head>
<body>

  <!-- Vídeo -->
  <div class="player-wrap">
    <video id="video-player" autoplay>
      <source src=" " type="video/mp4" id="video-source">
    </video>
  </div>

  <!-- UI superpuesta -->
  <div class="player-ui" id="player-ui">

    <!-- Top: volver + título -->
    <div class="ui-top">
      <a href="#" class="ui-back" id="ui-back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <div class="ui-title">
        <strong id="ui-serie-name">—</strong>
        <span id="ui-ep-label">—</span>
      </div>
    </div>

    <!-- Botón "Omitir intro" -->
    <button class="skip-intro" id="skip-intro-btn">Omitir introducción</button>

    <!-- Bottom: progreso + controles -->
    <div class="ui-bottom">
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-label">0:00 / 0:00</span>
      </div>

      <div class="controls-row">
        <div class="controls-left">
          <!-- Play/Pause -->
          <button class="ctrl-btn play" id="btn-play-pause" title="Play/Pausa">
            <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <!-- Retroceder 10s -->
          <button class="ctrl-btn sm" id="btn-back10" title="Retroceder 10s">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 5V2L8 6l4 4V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
              <text x="8.5" y="14.5" font-size="5" fill="currentColor" font-family="Arial" font-weight="bold">10</text>
            </svg>
          </button>
          <!-- Adelantar 10s -->
          <button class="ctrl-btn sm" id="btn-fwd10" title="Adelantar 10s">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 5V2l4 4-4 4V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
              <text x="8.5" y="14.5" font-size="5" fill="currentColor" font-family="Arial" font-weight="bold">10</text>
            </svg>
          </button>
          <!-- Volumen -->
          <div class="volume-wrap">
            <button class="ctrl-btn sm" id="btn-mute" title="Silenciar">
              <svg id="icon-vol" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            </button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>
        </div>

        <!-- Título episodio centrado -->
        <div class="controls-center" id="ctrl-ep-label"></div>

        <div class="controls-right">
          <!-- Siguiente episodio -->
          <button class="ctrl-btn sm" id="btn-next" title="Siguiente episodio" style="display:none">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
          </button>
          <!-- Pantalla completa -->
          <button class="ctrl-btn sm" id="btn-fullscreen" title="Pantalla completa">
            <svg id="icon-expand" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            <svg id="icon-compress" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="recursos/js/datos.js"></script>
  <script src="recursos/js/reproductor.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params  = new URLSearchParams(window.location.search);
      const serieId = params.get('serie');
      const capId   = parseInt(params.get('cap'), 10);

      const video   = document.getElementById('video-player');
      const ui      = document.getElementById('player-ui');
      let hideTimer;

      // ── Mostrar/ocultar UI con el ratón ──
      const showUI = () => {
        ui.classList.add('visible');
        document.body.style.cursor = '';
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          if (!video.paused) {
            ui.classList.remove('visible');
            document.body.style.cursor = 'none';
          }
        }, 3000);
      };
      document.addEventListener('mousemove', showUI);
      document.addEventListener('click', showUI);
      showUI();

      // ── Datos de la serie ──
      if (serieId && typeof seriesData !== 'undefined' && seriesData[serieId]) {
        const serie = seriesData[serieId];
        const cap   = serie.capitulos.find(c => c.id === capId);

        document.getElementById('ui-serie-name').textContent  = serie.title;
        document.getElementById('ui-ep-label').textContent    = cap ? `E${cap.id} – ${cap.title}` : '';
        document.getElementById('ctrl-ep-label').textContent  = cap ? `${serie.title}  ·  E${cap.id}` : '';
        document.getElementById('page-title').textContent     = cap ? `${serie.title} – E${cap.id}` : 'Reproduciendo...';

        // Botón "volver a la serie"
        document.getElementById('ui-back-btn').href = `index.html`;

        // Siguiente episodio
        const nextCap = serie.capitulos.find(c => c.id === capId + 1);
        const btnNext = document.getElementById('btn-next');
        if (nextCap) {
          btnNext.style.display = 'flex';
          btnNext.onclick = () => {
            window.location.href = `reproductor.html?serie=${serieId}&cap=${nextCap.id}`;
          };
        }
      }

      // ── Controles de vídeo ──
      const fill     = document.getElementById('progress-fill');
      const bar      = document.getElementById('progress-bar');
      const timeEl   = document.getElementById('time-label');
      const btnPP    = document.getElementById('btn-play-pause');
      const iconPlay = document.getElementById('icon-play');
      const iconPause= document.getElementById('icon-pause');

      const fmt = s => {
        const m = Math.floor(s / 60), sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2,'0')}`;
      };

      video.addEventListener('timeupdate', () => {
        if (!video.duration) return;
        const pct = (video.currentTime / video.duration) * 100;
        fill.style.width = pct + '%';
        timeEl.textContent = `${fmt(video.currentTime)} / ${fmt(video.duration)}`;

        // Omitir intro: mostrar en los primeros 90s
        const skipBtn = document.getElementById('skip-intro-btn');
        if (video.currentTime < 90 && video.currentTime > 2) skipBtn.classList.add('show');
        else skipBtn.classList.remove('show');
      });

      // Play/Pause
      const togglePlay = () => {
        if (video.paused) { video.play(); iconPlay.style.display='none'; iconPause.style.display=''; }
        else              { video.pause(); iconPlay.style.display=''; iconPause.style.display='none'; }
      };
      btnPP.onclick = togglePlay;
      video.addEventListener('click', togglePlay);
      video.addEventListener('play',  () => { iconPlay.style.display='none'; iconPause.style.display=''; });
      video.addEventListener('pause', () => { iconPlay.style.display=''; iconPause.style.display='none'; });

      // Seek en barra
      bar.addEventListener('click', e => {
        const rect = bar.getBoundingClientRect();
        video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
      });

      // ±10s
      document.getElementById('btn-back10').onclick = () => { video.currentTime = Math.max(0, video.currentTime - 10); };
      document.getElementById('btn-fwd10').onclick  = () => { video.currentTime = Math.min(video.duration, video.currentTime + 10); };

      // Volumen
      const volSlider = document.getElementById('volume-slider');
      document.getElementById('btn-mute').onclick = () => { video.muted = !video.muted; };
      volSlider.oninput = () => { video.volume = volSlider.value; video.muted = false; };

      // Pantalla completa
      const btnFS = document.getElementById('btn-fullscreen');
      const iconExp = document.getElementById('icon-expand');
      const iconCmp = document.getElementById('icon-compress');
      btnFS.onclick = () => {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen();
          iconExp.style.display='none'; iconCmp.style.display='';
        } else {
          document.exitFullscreen();
          iconExp.style.display=''; iconCmp.style.display='none';
        }
      };

      // Omitir intro → saltar a s.90
      document.getElementById('skip-intro-btn').onclick = () => { video.currentTime = 90; };

      // Teclado
      document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowLeft')   video.currentTime = Math.max(0, video.currentTime - 10);
        if (e.code === 'ArrowRight')  video.currentTime = Math.min(video.duration, video.currentTime + 10);
        if (e.code === 'ArrowUp')     video.volume = Math.min(1, video.volume + 0.1);
        if (e.code === 'ArrowDown')   video.volume = Math.max(0, video.volume - 0.1);
        if (e.code === 'KeyF')        btnFS.click();
        if (e.code === 'KeyM')        video.muted = !video.muted;
      });
    });
  </script>

</body>
</html>
